<svg xmlns="http://www.w3.org/2000/svg" width="500" height="320" viewBox="0 0 500 320">
    <style>
        @keyframes rainFall {
            0% { transform: translateY(-20px); opacity: 0.7; }
            100% { transform: translateY(320px); opacity: 0; }
        }
        @keyframes flash {
            0%, 100% { opacity: 0; }
            5% { opacity: 0.9; }
            10% { opacity: 0; }
            12% { opacity: 0.7; }
            15% { opacity: 0; }
        }
        @keyframes snowFall {
            0% { transform: translateY(-10px) translateX(0); opacity: 0.8; }
            50% { transform: translateY(160px) translateX(8px); opacity: 0.6; }
            100% { transform: translateY(320px) translateX(-8px); opacity: 0; }
        }
        @keyframes drift1 {
            0% { transform: translateX(-80px); }
            100% { transform: translateX(520px); }
        }
        @keyframes drift2 {
            0% { transform: translateX(520px); }
            100% { transform: translateX(-80px); }
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        @keyframes sunPulse {
            0%, 100% { r: 30; opacity: 0.3; }
            50% { r: 36; opacity: 0.6; }
        }
        @keyframes sunRotate {
            0% { transform: rotate(0deg); transform-origin: 440px 50px; }
            100% { transform: rotate(360deg); transform-origin: 440px 50px; }
        }
        @keyframes fogDrift {
            0% { transform: translateX(-50px); opacity: 0.1; }
            50% { opacity: 0.2; }
            100% { transform: translateX(50px); opacity: 0.1; }
        }
        .rain { animation: rainFall 0.8s linear infinite; }
        .lightning { animation: flash 4s ease-in-out infinite; }
        .snow { animation: snowFall 2.8s linear infinite; }
        .cloud1 { animation: drift1 20s linear infinite; }
        .cloud2 { animation: drift2 24s linear infinite; }
        .star { animation: twinkle 2s ease-in-out infinite; }
        .sun { animation: sunRotate 30s linear infinite; }
        .sun-ray { animation: sunPulse 3s ease-in-out infinite; }
        .fog { animation: fogDrift 6s ease-in-out infinite alternate; }
    </style>
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0B132B"/>
            <stop offset="50%" style="stop-color:#1C2541"/>
            <stop offset="100%" style="stop-color:#3A506B"/>
        </linearGradient>
        <clipPath id="rounded">
            <rect x="0" y="0" width="500" height="320" rx="20" ry="20"/>
        </clipPath>
        <!-- Dropshadow Filters -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.6"/>
        </filter>
        <filter id="light-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.4"/>
        </filter>
    </defs>
    
    <!-- Outer Shadow -->
    <rect x="4" y="4" width="500" height="320" rx="20" ry="20" fill="rgba(0,0,0,0.15)"/>
    
    <!-- Card Frame -->
    <g clip-path="url(#rounded)">
        <rect width="500" height="320" fill="url(#bg)" rx="20" ry="20"/>
        
        <!-- Weather Animations -->
        <circle cx="40" cy="20" r="1.5" fill="white" 
                opacity="0.6" class="star" style="animation-delay:0.0s"/>
            <circle cx="97" cy="43" r="1.5" fill="white" 
                opacity="0.6" class="star" style="animation-delay:0.4s"/>
            <circle cx="154" cy="66" r="1.5" fill="white" 
                opacity="0.6" class="star" style="animation-delay:0.8s"/>
            <circle cx="211" cy="29" r="1.5" fill="white" 
                opacity="0.6" class="star" style="animation-delay:1.2s"/>
            <circle cx="268" cy="52" r="1.5" fill="white" 
                opacity="0.6" class="star" style="animation-delay:1.6s"/>
            <circle cx="325" cy="75" r="1.5" fill="white" 
                opacity="0.6" class="star" style="animation-delay:2.0s"/>
            <circle cx="382" cy="38" r="1.5" fill="white" 
                opacity="0.6" class="star" style="animation-delay:2.4s"/>
            <circle cx="439" cy="61" r="1.5" fill="white" 
                opacity="0.6" class="star" style="animation-delay:2.8s"/>
            <circle cx="440" cy="45" r="16" fill="#E8EAF6" opacity="0.85"/>
            <circle cx="448" cy="40" r="14" fill="#0B132B"/>
        
        
        <!-- Top Info -->
        <text x="25" y="38" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" 
            font-weight="800" fill="#FFFFFF" filter="url(#shadow)">Bangkok, Tailândia</text>
        <text x="25" y="56" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="500"
            fill="#F1F5F9" filter="url(#light-shadow)">Ásia · 21:59 · Noite</text>
        
        <!-- Current Conditions (Left) -->
        <text x="25" y="118" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="52" 
            font-weight="900" fill="#FFFFFF" filter="url(#shadow)">28.8°C</text>
        <text x="25" y="136" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="500"
            fill="#F1F5F9" filter="url(#light-shadow)">Sensação: 34.2°C</text>
        
        <!-- Current Conditions (Right) -->
        <text x="475" y="102" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="48" text-anchor="end" filter="url(#shadow)">🌤️</text>
        <text x="475" y="128" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="700"
            fill="#FFFFFF" text-anchor="end" filter="url(#shadow)">Principalmente limpo</text>
        
        <!-- Glassmorphism Details Section -->
        <rect x="20" y="156" width="460" height="66" rx="12" 
            fill="rgba(255, 255, 255, 0.08)" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5"/>
        
        <!-- Row 1 details -->
        <text x="35" y="181" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#CBD5E1" filter="url(#light-shadow)">💧 Umid: 78%</text>
        <text x="180" y="181" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#CBD5E1" filter="url(#light-shadow)">💨 Vent: 7.8 km/h</text>
        <text x="340" y="181" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#CBD5E1" filter="url(#light-shadow)">☀️ UV: 0.0</text>
        
        <!-- Row 2 details -->
        <text x="35" y="206" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#CBD5E1" filter="url(#light-shadow)">🎈 Press: 1010 hPa</text>
        <text x="180" y="206" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#CBD5E1" filter="url(#light-shadow)">👁️ Visib: 15.6 km</text>
        <text x="340" y="206" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#CBD5E1" filter="url(#light-shadow)">☁️ Nuvens: 45%</text>
        
        <!-- 3-Hour Forecast Pills -->
        
        <!-- Pill 1 -->
        <rect x="20" y="240" width="144" height="52" rx="10" 
            fill="rgba(255, 255, 255, 0.08)" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1"/>
        <text x="32" y="261" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#F1F5F9">22:00</text>
        <text x="32" y="280" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF">28.7°C</text>
        <text x="124" y="275" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" filter="url(#shadow)">🌤️</text>
        
        <!-- Pill 2 -->
        <rect x="178" y="240" width="144" height="52" rx="10" 
            fill="rgba(255, 255, 255, 0.08)" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1"/>
        <text x="190" y="261" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#F1F5F9">23:00</text>
        <text x="190" y="280" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF">28.4°C</text>
        <text x="282" y="275" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" filter="url(#shadow)">⛅</text>
        
        <!-- Pill 3 -->
        <rect x="336" y="240" width="144" height="52" rx="10" 
            fill="rgba(255, 255, 255, 0.08)" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1"/>
        <text x="348" y="261" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#F1F5F9">00:00</text>
        <text x="348" y="280" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF">28.2°C</text>
        <text x="440" y="275" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" filter="url(#shadow)">⛅</text>
        
        
        <!-- Slim Day Progress Bar at the very bottom -->
        <rect x="20" y="306" width="460" height="4" rx="2" fill="rgba(0,0,0,0.25)"/>
        <rect x="20" y="306" width="459" height="4" rx="2" fill="#81D4FA"/>
    </g>
</svg>