<svg xmlns="http://www.w3.org/2000/svg" width="500" height="280" viewBox="0 0 500 280">
    <style>
        @keyframes rainFall {
            0% { transform: translateY(-20px); opacity: 0.7; }
            100% { transform: translateY(300px); opacity: 0; }
        }
        @keyframes flash {
            0%, 100% { opacity: 0; }
            5% { opacity: 0.9; }
            10% { opacity: 0; }
            12% { opacity: 0.7; }
            15% { opacity: 0; }
        }
        @keyframes drift1 {
            0% { transform: translateX(-80px); }
            100% { transform: translateX(520px); }
        }
        @keyframes drift2 {
            0% { transform: translateX(520px); }
            100% { transform: translateX(-80px); }
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        @keyframes sunPulse {
            0%, 100% { r: 30; opacity: 0.3; }
            50% { r: 36; opacity: 0.6; }
        }
        @keyframes sunRotate {
            0% { transform: rotate(0deg); transform-origin: 440px 50px; }
            100% { transform: rotate(360deg); transform-origin: 440px 50px; }
        }
        @keyframes fogDrift {
            0% { transform: translateX(-50px); opacity: 0.1; }
            50% { opacity: 0.2; }
            100% { transform: translateX(50px); opacity: 0.1; }
        }
        .rain { animation: rainFall 0.8s linear infinite; }
        .lightning { animation: flash 4s ease-in-out infinite; }
        .cloud1 { animation: drift1 18s linear infinite; }
        .cloud2 { animation: drift2 22s linear infinite; }
        .star { animation: twinkle 2s ease-in-out infinite; }
        .sun { animation: sunRotate 30s linear infinite; }
        .sun-ray { animation: sunPulse 3s ease-in-out infinite; }
        .fog { animation: fogDrift 6s ease-in-out infinite alternate; }
    </style>
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#36D1DC"/>
            <stop offset="100%" style="stop-color:#5B86E5"/>
        </linearGradient>
        <clipPath id="rounded">
            <rect x="0" y="0" width="500" height="280" rx="20" ry="20"/>
        </clipPath>
        <!-- High-fidelity Drop Shadow for ultimate readability -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.75"/>
        </filter>
        <filter id="light-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.6"/>
        </filter>
    </defs>
    
    <!-- Shadow -->
    <rect x="4" y="4" width="500" height="280" rx="20" ry="20" fill="rgba(0,0,0,0.2)"/>
    
    <!-- Background -->
    <g clip-path="url(#rounded)">
        <rect width="500" height="280" fill="url(#bg)" rx="20" ry="20"/>
        
        <!-- Weather Animations -->
        <ellipse cx="100" cy="60" rx="60" ry="20" fill="rgba(200,200,210,0.25)" class="cloud1"/>
            <ellipse cx="350" cy="45" rx="50" ry="15" fill="rgba(200,200,210,0.2)" class="cloud2"/>
        
        
        <!-- City name & country -->
        <text x="25" y="38" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" 
            font-weight="800" fill="#FFFFFF" filter="url(#shadow)">São Paulo, Brasil</text>
        <text x="25" y="58" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="500"
            fill="#F0F0F0" filter="url(#light-shadow)">América do Sul · 06:51 · DIA ☀️</text>
        
        <!-- Temperature -->
        <text x="25" y="115" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="56" 
            font-weight="900" fill="#FFFFFF" filter="url(#shadow)">14°C</text>
        <text x="25" y="138" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="500"
            fill="#F0F0F0" filter="url(#light-shadow)">Sensação 15°C</text>
        
        <!-- Condition emoji & text -->
        <text x="260" y="105" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="44" filter="url(#shadow)">☁️</text>
        <text x="260" y="132" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="600"
            fill="#FFFFFF" filter="url(#shadow)">Nublado</text>
        
        <!-- Details -->
        <text x="25" y="175" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#E0E0E0" filter="url(#light-shadow)">
            💧 Umidade: 98%   💨 Vento: 7 km/h   🌡️ Mín 14° / Máx 20°
        </text>
        
        <!-- Sunrise / Sunset -->
        <text x="25" y="195" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="500" fill="#E0E0E0" filter="url(#light-shadow)">
            🌅 Nascer: 06:37  →  🌇 Pôr do sol: 17:29
        </text>
        
        <!-- Day Progress Bar -->
        <rect x="25" y="215" width="400" height="8" rx="4" fill="rgba(0,0,0,0.3)"/>
        <rect x="25" y="215" width="8" height="8" rx="4" fill="#FFD54F"/>
        <text x="435" y="222" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700"
            fill="#FFFFFF" filter="url(#shadow)">2%</text>
        
        <!-- Footer -->
        <text x="25" y="262" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="500"
            fill="#E0E0E0" filter="url(#light-shadow)">📍 -23.55, -46.63 · Atualizado: 2026-05-23 06:51</text>
    </g>
</svg>