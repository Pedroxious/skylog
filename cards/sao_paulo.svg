<svg xmlns="http://www.w3.org/2000/svg" width="500" height="280" viewBox="0 0 500 280">
    <style>
        @keyframes rainFall {
            0% { transform: translateY(-20px); opacity: 0.7; }
            100% { transform: translateY(300px); opacity: 0; }
        }
        @keyframes flash {
            0%, 100% { opacity: 0; }
            5% { opacity: 0.9; }
            10% { opacity: 0; }
            12% { opacity: 0.7; }
            15% { opacity: 0; }
        }
        @keyframes drift1 {
            0% { transform: translateX(-80px); }
            100% { transform: translateX(520px); }
        }
        @keyframes drift2 {
            0% { transform: translateX(520px); }
            100% { transform: translateX(-80px); }
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        @keyframes sunPulse {
            0%, 100% { r: 30; opacity: 0.3; }
            50% { r: 36; opacity: 0.6; }
        }
        @keyframes sunRotate {
            0% { transform: rotate(0deg); transform-origin: 440px 50px; }
            100% { transform: rotate(360deg); transform-origin: 440px 50px; }
        }
        @keyframes fogDrift {
            0% { transform: translateX(-50px); opacity: 0.1; }
            50% { opacity: 0.2; }
            100% { transform: translateX(50px); opacity: 0.1; }
        }
        .rain { animation: rainFall 0.8s linear infinite; }
        .lightning { animation: flash 4s ease-in-out infinite; }
        .cloud1 { animation: drift1 18s linear infinite; }
        .cloud2 { animation: drift2 22s linear infinite; }
        .star { animation: twinkle 2s ease-in-out infinite; }
        .sun { animation: sunRotate 30s linear infinite; }
        .sun-ray { animation: sunPulse 3s ease-in-out infinite; }
        .fog { animation: fogDrift 6s ease-in-out infinite alternate; }
    </style>
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1B5E20"/>
            <stop offset="100%" style="stop-color:#A5D6A7"/>
        </linearGradient>
        <clipPath id="rounded">
            <rect x="0" y="0" width="500" height="280" rx="20" ry="20"/>
        </clipPath>
    </defs>
    
    <!-- Shadow -->
    <rect x="4" y="4" width="500" height="280" rx="20" ry="20" fill="rgba(0,0,0,0.15)"/>
    
    <!-- Background -->
    <g clip-path="url(#rounded)">
        <rect width="500" height="280" fill="url(#bg)" rx="20" ry="20"/>
        
        <!-- Weather Animations -->
        <line x1="30" y1="-10" x2="22" y2="15" 
                stroke="rgba(200,220,255,0.4)" stroke-width="1.5" class="rain" 
                style="animation-delay:0.00s"/>
            <line x1="68" y1="-10" x2="60" y2="20" 
                stroke="rgba(200,220,255,0.4)" stroke-width="1.5" class="rain" 
                style="animation-delay:0.15s"/>
            <line x1="106" y1="-10" x2="98" y2="25" 
                stroke="rgba(200,220,255,0.4)" stroke-width="1.5" class="rain" 
                style="animation-delay:0.30s"/>
            <line x1="144" y1="-10" x2="136" y2="15" 
                stroke="rgba(200,220,255,0.4)" stroke-width="1.5" class="rain" 
                style="animation-delay:0.45s"/>
            <line x1="182" y1="-10" x2="174" y2="20" 
                stroke="rgba(200,220,255,0.4)" stroke-width="1.5" class="rain" 
                style="animation-delay:0.60s"/>
            <line x1="220" y1="-10" x2="212" y2="25" 
                stroke="rgba(200,220,255,0.4)" stroke-width="1.5" class="rain" 
                style="animation-delay:0.75s"/>
            <line x1="258" y1="-10" x2="250" y2="15" 
                stroke="rgba(200,220,255,0.4)" stroke-width="1.5" class="rain" 
                style="animation-delay:0.90s"/>
            <line x1="296" y1="-10" x2="288" y2="20" 
                stroke="rgba(200,220,255,0.4)" stroke-width="1.5" class="rain" 
                style="animation-delay:1.05s"/>
            <line x1="334" y1="-10" x2="326" y2="25" 
                stroke="rgba(200,220,255,0.4)" stroke-width="1.5" class="rain" 
                style="animation-delay:1.20s"/>
            <line x1="372" y1="-10" x2="364" y2="15" 
                stroke="rgba(200,220,255,0.4)" stroke-width="1.5" class="rain" 
                style="animation-delay:1.35s"/>
            <line x1="410" y1="-10" x2="402" y2="20" 
                stroke="rgba(200,220,255,0.4)" stroke-width="1.5" class="rain" 
                style="animation-delay:0.00s"/>
            <line x1="448" y1="-10" x2="440" y2="25" 
                stroke="rgba(200,220,255,0.4)" stroke-width="1.5" class="rain" 
                style="animation-delay:0.15s"/>
            
        
        <!-- City name & country -->
        <text x="25" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="18" 
            font-weight="700" fill="#E8EAF6">São Paulo, Brasil</text>
        <text x="25" y="56" font-family="Segoe UI, Arial, sans-serif" font-size="11" 
            fill="#B0BEC5">América do Sul · 19:38 · NOITE 🌙</text>
        
        <!-- Temperature -->
        <text x="25" y="110" font-family="Segoe UI, Arial, sans-serif" font-size="52" 
            font-weight="800" fill="#E8EAF6">19°C</text>
        <text x="25" y="130" font-family="Segoe UI, Arial, sans-serif" font-size="13" 
            fill="#B0BEC5">Sensação 20°C</text>
        
        <!-- Condition emoji & text -->
        <text x="250" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="36">🌧️</text>
        <text x="250" y="125" font-family="Segoe UI, Arial, sans-serif" font-size="12" 
            fill="#B0BEC5">Chuva leve</text>
        
        <!-- Details -->
        <text x="25" y="165" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#78909C">
            💧 Umidade: 93%   💨 Vento: 10 km/h   🌡️ Mín 17° / Máx 23°
        </text>
        
        <!-- Sunrise / Sunset -->
        <text x="25" y="190" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#78909C">
            🌅 06:34  →  🌇 17:31
        </text>
        
        <!-- Day Progress Bar -->
        <rect x="25" y="210" width="400" height="6" rx="3" fill="rgba(128,128,128,0.2)"/>
        <rect x="25" y="210" width="400" height="6" rx="3" fill="#5C6BC0"/>
        <text x="430" y="215" font-family="Segoe UI, Arial, sans-serif" font-size="10" 
            fill="#78909C">100%</text>
        
        <!-- Footer -->
        <text x="25" y="260" font-family="Segoe UI, Arial, sans-serif" font-size="10" 
            fill="#78909C">📍 -23.55, -46.63 · Atualizado: 2026-05-17 19:38</text>
    </g>
</svg>