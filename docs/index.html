<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyLog Premium Live Hub</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">
    <!-- Vanilla Tilt for 3D physics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body class="global-mood">

    <!-- Ambient Audio -->
    <audio id="audio-rain" loop src="https://cdn.freesound.org/previews/531/531947_11100236-lq.mp3"></audio>
    <audio id="audio-birds" loop src="https://cdn.freesound.org/previews/416/416529_5121236-lq.mp3"></audio>
    <audio id="audio-storm" loop src="https://cdn.freesound.org/previews/102/102733_1720873-lq.mp3"></audio>
    <audio id="audio-wind" loop src="https://cdn.freesound.org/previews/136/136402_1762446-lq.mp3"></audio>

    <div class="weather-background" id="weatherBg"></div>

    <div class="app-wrapper">
        <header class="glass-header px-4 py-3 d-flex justify-content-between align-items-center mb-4">
            <div class="brand">
                <h1 class="m-0 fw-bolder logo-text">SkyLog <span class="badge bg-danger ms-2 pulse-badge fs-6">LIVE
                        3D</span></h1>
                <p class="m-0 small opacity-75 fw-bold text-uppercase tracking-wide">Sync Global Intelligence</p>
            </div>

            <div class="controls d-flex align-items-center gap-4">
                <button class="btn btn-premium-glass" id="playAudioBtn">
                    <span class="icon">🔇</span> Som Ambiente
                </button>
                <div class="status-indicator d-flex mx-2">
                    <div class="pulse-ring"></div>
                    <span id="lastUpdated" class="fw-bold small ms-2">Conectando Sensores...</span>
                </div>
            </div>
        </header>

        <main class="container-fluid px-4 pb-5">
            <div class="row g-4" id="citiesGrid">
                <!-- Cards Injected Here via JS -->
            </div>
        </main>
    </div>

    <!-- Modals or Expanded Charts could go here -->

    <!-- Load App JS -->
    <script src="app.js"></script>
</body>

</html>
