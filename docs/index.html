<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skylog | Premium Climate Intelligence</title>
    <meta name="description"
        content="Futuristic climate monitoring dashboard with cinematic weather visuals and advanced environmental intelligence." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Core Styles -->
  <script type="module" crossorigin src="./assets/index-Csol_D-I.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/charts-C_ASVdvE.js">
  <link rel="modulepreload" crossorigin href="./assets/maps-zdHhRoWp.js">
  <link rel="stylesheet" crossorigin href="./assets/index-BhSytECo.css">
</head>

<body class="bg-[#020617] text-slate-50 font-sans selection:bg-cyan-500/30 overflow-x-hidden">

    <!-- ── Dynamic Weather Background ── -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <img id="bg-current" src=""
            class="absolute inset-0 w-full h-full object-cover transition-opacity duration-700 brightness-[0.6] contrast-[1.1]"
            alt="" />
        <img id="bg-next" src=""
            class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-700 brightness-[0.6] contrast-[1.1]"
            alt="" />
        <!-- Gradient Overlays for Depth -->
        <div class="absolute inset-0 bg-gradient-to-t from-[#020617] via-transparent to-[#020617]/40"></div>
        <div class="absolute inset-0 bg-gradient-to-r from-[#020617]/60 via-transparent to-[#020617]/60"></div>
        <div class="absolute inset-0 backdrop-blur-[2px]"></div>
    </div>

    <!-- ── Application Wrapper ── -->
    <div class="relative z-10 min-h-screen flex flex-col lg:flex-row">

        <!-- ── Sidebar (Navigation & Cities) ── -->
        <aside
            class="w-full lg:w-80 h-auto lg:h-screen sticky top-0 flex flex-col glass-sidebar border-b lg:border-b-0 lg:border-r border-white/5 backdrop-blur-3xl">
            <div class="p-6">
                <div class="flex items-center gap-3 mb-8">
                    <div
                        class="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center shadow-lg shadow-cyan-500/20">
                        <i data-lucide="cloud-rain-wind" class="text-white w-6 h-6"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight font-space">SKYLOG</h1>
                        <p class="text-[10px] font-bold text-cyan-400/80 tracking-[0.2em] uppercase">Intelligence Hub
                        </p>
                    </div>
                </div>

                <!-- City Search Box -->
                <div class="relative mb-6 group">
                    <div
                        class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-white/30 group-focus-within:text-cyan-400 transition-colors">
                        <i data-lucide="search" class="w-4 h-4"></i>
                    </div>
                    <input type="text" id="city-search" placeholder="Search city..."
                        class="w-full pl-10 pr-4 py-2.5 bg-white/[0.03] border border-white/10 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500/20 focus:border-cyan-500/30 transition-all placeholder:text-white/20" />
                    <!-- Search Dropdown/Results -->
                    <div id="search-results"
                        class="absolute top-full left-0 right-0 mt-2 bg-white/[0.07] backdrop-blur-2xl border border-white/10 rounded-xl shadow-2xl overflow-hidden z-50 hidden">
                    </div>
                </div>
            </div>

            <!-- City List -->
            <div class="flex-1 overflow-y-auto px-4 pb-6 space-y-2 custom-scrollbar" id="city-list">
                <!-- Rendered by ui.js -->
            </div>

            <div class="p-4 border-t border-white/5 bg-black/10">
                <div
                    class="flex items-center justify-between text-[10px] text-white/20 font-bold uppercase tracking-widest">
                    <span>Sensors Active</span>
                    <span class="flex items-center gap-1.5"><span
                            class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span> Live Link</span>
                </div>
            </div>
        </aside>

        <!-- ── Main Content Area ── -->
        <main class="flex-1 flex flex-col p-4 lg:p-8 gap-6 max-w-7xl mx-auto w-full">

            <!-- Top Section: Hero Card -->
            <section id="hero-section"
                class="relative overflow-hidden rounded-3xl p-8 lg:p-10 glass-card border border-white/10 text-white shadow-2xl min-h-[320px] flex flex-col justify-center">
                <!-- Loader Skeleton will be here -->
            </section>

            <!-- Mid Section: Hourly & Daily Grid -->
            <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">

                <!-- Hourly Forecast (24h) & Weather Card -->
                <div class="xl:col-span-8 flex flex-col gap-6">
                    <!-- Hourly Forecast -->
                    <div class="space-y-4">
                        <div class="flex items-center justify-between px-2">
                            <h3 class="text-sm font-semibold text-white/70 flex items-center gap-2">
                                <i data-lucide="clock" class="w-4 h-4"></i> Hourly Forecast
                            </h3>
                        </div>
                        <div class="glass-card rounded-2xl p-4 overflow-x-auto flex gap-4 no-scrollbar border border-white/10"
                            id="hourly-container">
                            <!-- Rendered by ui.js -->
                        </div>
                    </div>

                    <!-- Climate Forecast Analytics -->
                    <div class="space-y-4 flex-1 flex flex-col justify-end">
                        <div class="flex items-center justify-between px-2">
                            <h3 class="text-sm font-semibold text-white/70 flex items-center gap-2">
                                <i data-lucide="cloud-sun" class="w-4 h-4"></i> Climate Forecast Analytics
                            </h3>
                        </div>
                        <div class="glass-card rounded-3xl p-6 border border-white/10 flex-1 flex flex-col justify-center"
                            id="weather-card-container">
                            <!-- Rendered by ui.js -->
                        </div>
                    </div>
                </div>

                <!-- Daily/Detailed List -->
                <div class="xl:col-span-4 space-y-4">
                    <div class="flex items-center justify-between px-2">
                        <h3 class="text-sm font-semibold text-white/70 flex items-center gap-2">
                            <i data-lucide="calendar" class="w-4 h-4"></i> 7-Day Forecast
                        </h3>
                    </div>
                    <div class="glass-card rounded-2xl p-4 border border-white/10 space-y-1" id="daily-forecast">
                        <!-- Rendered by ui.js -->
                    </div>
                </div>
            </div>

            <!-- Bottom Section: Detailed Metrics Grid -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="metrics-grid">
                <!-- 8 Metrics rendered by ui.js -->
            </div>

            <!-- Charts & Visuals Grid -->
            <div class="grid grid-cols-1 xl:grid-cols-2 gap-6 mb-8">

                <!-- Temperature Chart -->
                <div class="glass-card rounded-3xl p-6 border border-white/10 flex flex-col gap-4">
                    <div class="flex items-center justify-between">
                        <h3
                            class="text-sm font-semibold text-white/60 flex items-center gap-2 uppercase tracking-widest">
                            <i data-lucide="line-chart" class="w-4 h-4"></i> Temp Analysis
                        </h3>
                    </div>
                    <div class="flex-1 min-h-[250px]">
                        <canvas id="temp-chart"></canvas>
                    </div>
                </div>

                <!-- Precipitation / Humidity Chart -->
                <div class="glass-card rounded-3xl p-6 border border-white/10 flex flex-col gap-4">
                    <div class="flex items-center justify-between">
                        <h3
                            class="text-sm font-semibold text-white/60 flex items-center gap-2 uppercase tracking-widest">
                            <i data-lucide="bar-chart-3" class="w-4 h-4"></i> Precipitation
                        </h3>
                    </div>
                    <div class="flex-1 min-h-[250px]">
                        <canvas id="precip-chart"></canvas>
                    </div>
                </div>

                <!-- Map & Radar Section -->
                <div class="glass-card rounded-3xl p-6 border border-white/10 flex flex-col gap-4">
                    <div class="flex items-center justify-between">
                        <h3
                            class="text-sm font-semibold text-white/60 flex items-center gap-2 uppercase tracking-widest">
                            <i data-lucide="map" class="w-4 h-4"></i> Radar System
                        </h3>
                    </div>
                    <div class="flex-1 min-h-[400px] rounded-2xl overflow-hidden relative" id="weather-map">
                        <!-- Leaflet Map -->
                    </div>
                </div>

                <!-- UV, Wind, Sun Indicators -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <!-- Wind Radial -->
                    <div
                        class="glass-card rounded-3xl p-6 border border-white/10 flex flex-col items-center justify-center">
                        <h3 class="text-xs font-semibold text-white/30 uppercase tracking-widest mb-4">Wind
                            Visualization</h3>
                        <div id="wind-chart" class="w-full aspect-square max-w-[200px]"></div>
                    </div>

                    <!-- Sunrise/Sunset Arc -->
                    <div
                        class="glass-card rounded-3xl p-6 border border-white/10 flex flex-col items-center justify-center">
                        <h3 class="text-xs font-semibold text-white/30 uppercase tracking-widest mb-4">Solar Path</h3>
                        <div id="sun-container" class="w-full"></div>
                    </div>

                    <!-- AQI Indicators -->
                    <div
                        class="glass-card rounded-3xl p-6 border border-white/10 flex flex-col col-span-1 md:col-span-2">
                        <h3 class="text-xs font-semibold text-white/30 uppercase tracking-widest mb-4">Atmospheric
                            Quality (AQI)</h3>
                        <div id="aqi-container" class="space-y-4"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- ── Full Loading Overlay ── -->
    <div id="loading-overlay"
        class="fixed inset-0 z-[100] bg-[#020617] flex flex-col items-center justify-center transition-opacity duration-600">
        <div class="relative w-24 h-24 mb-6">
            <div class="absolute inset-0 border-4 border-cyan-500/10 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center">
                <i data-lucide="cloud-rain" class="text-cyan-400 w-8 h-8"></i>
            </div>
        </div>
        <h2 class="text-lg font-bold tracking-widest uppercase animate-pulse">Syncing Sensors</h2>
        <p id="loading-status" class="text-xs text-white/20 mt-2 uppercase font-medium">Initializing climate grid...</p>
    </div>

    <!-- ── Scripts ── -->
</body>

</html>
