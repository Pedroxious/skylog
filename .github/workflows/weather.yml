name: 🌍 SkyLog Weather Dashboard Update

on:
  schedule:
    - cron: '0 12 * * *'    # 9h BRT (UTC-3)
    - cron: '0 15 * * *'    # 12h BRT
    - cron: '0 22 * * *'    # 19h BRT
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run weather update
        run: python update_weather.py

      - name: Commit and Push
        run: |
          git config user.name "Pedroxious"
          git config user.email "130319175+Pedroxious@users.noreply.github.com"
          git add README.md cards/ data/history.csv
          git diff --staged --quiet || git commit -m "🌍 weather update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
